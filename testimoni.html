<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testimoni - Toko Buku Nafisah</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <h1>Toko Buku Nafisah</h1>
</header>

<nav>
    <a href="index.html">Beranda</a>
    <a href="produk.html">Produk</a>
    <a href="bedah-buku.html">Bedah Buku</a>
    <a href="testimoni.html">Testimoni</a>
    <a href="tampil-testimoni.html">Testimoni Pembeli</a>
    <a href="kontak.html">Kontak</a>
    <a href="event.html">Event</a>
</nav>

<main class="formulir">
    <h2>Berikan Testimoni Anda</h2>

    <form id="formTestimoni">

        <label>Nama:</label>
        <input type="text" id="nama" required placeholder="Nama lengkap">

        <label>Email:</label>
        <input type="email" id="email" required placeholder="email@example.com">

        <label>Testimoni:</label>
        <textarea id="pesan" required placeholder="Tulis pengalaman anda..." rows="5"></textarea>

        <label>Asal:</label>
        <input type="text" id="asal" required placeholder="Contoh: SMA Al Kautsar">

        <label>Judul Buku:</label>
        <input type="text" id="judul">

        <label>Rating (1-5):</label>
        <input type="number" id="rating" min="1" max="5">

        <button type="submit">Kirim Testimoni</button>

    </form>
</main>

<footer>
    <p>&copy; 2026 Toko Buku Nafisah</p>
</footer>

<script>
document.getElementById('formTestimoni').addEventListener('submit', function(e) {
    e.preventDefault();

    const dataBaru = {
        nama: document.getElementById('nama').value,
        email: document.getElementById('email').value,
        pesan: document.getElementById('pesan').value,
        asal: document.getElementById('asal').value,
        judul: document.getElementById('judul').value,
        rating: document.getElementById('rating').value
    };

    const testimoniList = JSON.parse(localStorage.getItem('testimoniList')) || [];
    testimoniList.push(dataBaru);
    localStorage.setItem('testimoniList', JSON.stringify(testimoniList));

    window.location.href = 'proses-testimoni.html';
});
</script>

</body>
</html>
